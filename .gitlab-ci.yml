stages:
  - deploy

deploy_production:
  stage: deploy
  # Deploy backend to Railway on main branch pushes
  image: node:20
  only:
    - main
  script:
    - npm install -g @railway/cli
    - test -n "${RAILWAY_API_TOKEN:-$RAILWAY_TOKEN}" || (echo "RAILWAY_API_TOKEN/RAILWAY_TOKEN manquant" && exit 1)
    - test -n "$RAILWAY_SERVICE_ID" || (echo "RAILWAY_SERVICE_ID manquant" && exit 1)
    - export RAILWAY_API_TOKEN="${RAILWAY_API_TOKEN:-$RAILWAY_TOKEN}"
    # region agent log
    - 'node -e "const t=process.env.RAILWAY_TOKEN||\"\";const a=process.env.RAILWAY_API_TOKEN||\"\";const s=process.env.RAILWAY_SERVICE_ID||\"\";const m={runId:\"ci-auth-check\",hypothesisId:\"H6-H10\",location:\".gitlab-ci.yml:script\",message:\"Railway vars diagnostics\",data:{tokenLength:t.length,apiTokenLength:a.length,tokenHasWhitespace:/\\s/.test(t),apiTokenHasWhitespace:/\\s/.test(a),tokenEqualsServiceId:t===s,apiTokenEqualsServiceId:a===s,serviceIdLength:s.length,serviceIdLooksUuid:/^[0-9a-f-]{36}$/i.test(s)},timestamp:Date.now()};console.log(JSON.stringify(m));"'
    # endregion
    # region agent log
    - 'node -e "const m={runId:\"ci-deploy-target\",hypothesisId:\"H8-H9\",location:\".gitlab-ci.yml:script\",message:\"Railway deploy target diagnostics\",data:{projectIdPresent:!!process.env.RAILWAY_PROJECT_ID,environmentIdPresent:!!process.env.RAILWAY_ENVIRONMENT_ID,serviceId:(process.env.RAILWAY_SERVICE_ID||\"\").slice(0,8)+\"...\"},timestamp:Date.now()};console.log(JSON.stringify(m));"'
    # endregion
    - 'railway whoami || (echo "Railway auth failed: verifier RAILWAY_API_TOKEN (ou fallback RAILWAY_TOKEN) dans GitLab CI variables" && exit 1)'
    - railway up --service "$RAILWAY_SERVICE_ID" --ci --verbose
