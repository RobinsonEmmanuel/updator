stages:
  - deploy

deploy_production:
  stage: deploy
  # Deploy backend to Railway on main branch pushes
  image: node:20
  only:
    - main
  script:
    - npm install -g @railway/cli
    - test -n "${RAILWAY_API_TOKEN:-$RAILWAY_TOKEN}" || (echo "RAILWAY_API_TOKEN/RAILWAY_TOKEN manquant" && exit 1)
    - test -n "$RAILWAY_SERVICE_ID" || (echo "RAILWAY_SERVICE_ID manquant" && exit 1)
    - export EFFECTIVE_RAILWAY_TOKEN="${RAILWAY_API_TOKEN:-$RAILWAY_TOKEN}"
    - export RAILWAY_API_TOKEN="$EFFECTIVE_RAILWAY_TOKEN"
    - export RAILWAY_TOKEN="$EFFECTIVE_RAILWAY_TOKEN"
    - 'railway up --service "$RAILWAY_SERVICE_ID" --ci --verbose || (echo "Railway deploy failed: verifier token, service ID, et droits du token sur ce projet/service" && exit 1)'
